name: Release

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. Check if version actually changed ──────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version against existing releases
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if release already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")

          if [ "$STATUS" = "200" ]; then
            echo "Release v${VERSION} already exists — skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New release v${VERSION} — proceeding"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build macOS ────────────────────────────────────────
  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron-builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  # ── 3. Create Release ─────────────────────────────────────
  create-release:
    needs: [check-version, build-macos]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release folder
        run: |
          mkdir -p release
          # Flatten all artifacts into release/
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Generate latest.json and hashes.txt
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Compute hashes for mac artifacts
          DMG_FILE=$(ls release/*.dmg 2>/dev/null | head -1)
          ZIP_FILE=$(ls release/*.zip 2>/dev/null | head -1)

          DMG_HASH="" ; DMG_SIZE=0
          ZIP_HASH="" ; ZIP_SIZE=0

          if [ -n "$DMG_FILE" ]; then
            DMG_HASH=$(sha256sum "$DMG_FILE" | awk '{print $1}')
            DMG_SIZE=$(stat --format=%s "$DMG_FILE" 2>/dev/null || stat -f%z "$DMG_FILE")
          fi
          if [ -n "$ZIP_FILE" ]; then
            ZIP_HASH=$(sha256sum "$ZIP_FILE" | awk '{print $1}')
            ZIP_SIZE=$(stat --format=%s "$ZIP_FILE" 2>/dev/null || stat -f%z "$ZIP_FILE")
          fi

          # Write latest.json
          cat > release/latest.json << EOF
          {
            "version": "${VERSION}",
            "releaseDate": "${DATE}",
            "releaseNotes": "Bug fixes and improvements.",
            "platforms": {
              "mac-dmg": { "sha256": "${DMG_HASH}", "size": ${DMG_SIZE} },
              "mac-zip": { "sha256": "${ZIP_HASH}", "size": ${ZIP_SIZE} }
            }
          }
          EOF

          # Write hashes.txt
          cd release && sha256sum *.dmg *.zip 2>/dev/null > hashes.txt || true
          cd ..

          echo "=== latest.json ==="
          cat release/latest.json
          echo ""
          echo "=== hashes.txt ==="
          cat release/hashes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Foundry v${{ needs.check-version.outputs.version }}
          body: |
            ## Foundry v${{ needs.check-version.outputs.version }}

            ### Downloads
            - **macOS (DMG):** `Foundry-*.dmg`
            - **macOS (ZIP):** `Foundry-*.zip`

            ### Auto-Update
            Running instances of Foundry will detect this update automatically within 5 minutes.

            ---
            SHA256 checksums are in `hashes.txt`.
          files: |
            release/*.dmg
            release/*.zip
            release/latest.json
            release/hashes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
