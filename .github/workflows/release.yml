name: Release

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. Check if version actually changed ──────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version against existing releases
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if release already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")

          if [ "$STATUS" = "200" ]; then
            echo "Release v${VERSION} already exists — skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New release v${VERSION} — proceeding"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build macOS ────────────────────────────────────────
  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron-builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  # ── 3. Build Windows ──────────────────────────────────────
  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron-builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: release/*.exe
          if-no-files-found: error

  # ── 4. Build Linux ────────────────────────────────────────
  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron-builder
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: release/*.AppImage
          if-no-files-found: error

  # ── 5. Create Release ─────────────────────────────────────
  create-release:
    needs: [check-version, build-macos, build-windows, build-linux]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release folder
        run: |
          mkdir -p release
          # Flatten all artifacts into release/
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Generate latest.json and hashes.txt
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Compute hashes
          MAC_FILE=$(ls release/*.dmg 2>/dev/null | head -1)
          WIN_FILE=$(ls release/*.exe 2>/dev/null | head -1)
          LINUX_FILE=$(ls release/*.AppImage 2>/dev/null | head -1)

          MAC_HASH="" ; MAC_SIZE=0
          WIN_HASH="" ; WIN_SIZE=0
          LINUX_HASH="" ; LINUX_SIZE=0

          if [ -n "$MAC_FILE" ]; then
            MAC_HASH=$(sha256sum "$MAC_FILE" | awk '{print $1}')
            MAC_SIZE=$(stat --format=%s "$MAC_FILE" 2>/dev/null || stat -f%z "$MAC_FILE")
          fi
          if [ -n "$WIN_FILE" ]; then
            WIN_HASH=$(sha256sum "$WIN_FILE" | awk '{print $1}')
            WIN_SIZE=$(stat --format=%s "$WIN_FILE" 2>/dev/null || stat -f%z "$WIN_FILE")
          fi
          if [ -n "$LINUX_FILE" ]; then
            LINUX_HASH=$(sha256sum "$LINUX_FILE" | awk '{print $1}')
            LINUX_SIZE=$(stat --format=%s "$LINUX_FILE" 2>/dev/null || stat -f%z "$LINUX_FILE")
          fi

          # Write latest.json
          cat > release/latest.json << EOF
          {
            "version": "${VERSION}",
            "releaseDate": "${DATE}",
            "releaseNotes": "Bug fixes and improvements.",
            "platforms": {
              "mac":   { "sha256": "${MAC_HASH}", "size": ${MAC_SIZE} },
              "win":   { "sha256": "${WIN_HASH}", "size": ${WIN_SIZE} },
              "linux": { "sha256": "${LINUX_HASH}", "size": ${LINUX_SIZE} }
            }
          }
          EOF

          # Write hashes.txt
          cd release && sha256sum *.dmg *.exe *.AppImage 2>/dev/null > hashes.txt || true
          cd ..

          echo "=== latest.json ==="
          cat release/latest.json
          echo ""
          echo "=== hashes.txt ==="
          cat release/hashes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Foundry v${{ needs.check-version.outputs.version }}
          body: |
            ## Foundry v${{ needs.check-version.outputs.version }}

            ### Downloads
            - **macOS:** `Foundry-*.dmg`
            - **Windows:** `Foundry-*.exe`
            - **Linux:** `Foundry-*.AppImage`

            ### Auto-Update
            Running instances of Foundry will detect this update automatically within 5 minutes.

            ---
            SHA256 checksums are in `hashes.txt`.
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/latest.json
            release/hashes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
